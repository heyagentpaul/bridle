name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}

      - name: Sync dependencies
        run: uv sync --python ${{ matrix.python }} --frozen

      - name: Lint
        run: uv run --python ${{ matrix.python }} ruff check

      - name: Format check
        run: uv run --python ${{ matrix.python }} ruff format --check

      - name: Type check
        run: uv run --python ${{ matrix.python }} pyright

      - name: Tests
        run: uv run --python ${{ matrix.python }} pytest -q
